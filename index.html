<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>newsbackmedia</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial, Helvetica, sans-serif;
}

body{
    background:#000;
    color:#fff;
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
    text-align:center;
}

.container{
    max-width:700px;
    padding:40px;
    border:2px solid #fff;
}

.logo{
    font-size:48px;
    font-weight:bold;
    letter-spacing:5px;
    margin-bottom:15px;
}

.line{
    width:80px;
    height:3px;
    background:#fff;
    margin:20px auto;
}

h2{
    font-size:28px;
    margin-bottom:15px;
}

p{
    font-size:16px;
    color:#ddd;
    line-height:1.8;
}

footer{
    margin-top:35px;
    font-size:13px;
    color:#999;
}
</style>
</head>

<body>

<div class="container">

    <div class="logo">NBM</div>

    <div class="line"></div>

    <h2>Blog Sedang Dalam Tahap Pengembangan</h2>

    <p>
        Kami sedang mempersiapkan pengalaman terbaik bagi para pembaca.
        Beberapa fitur dan layanan belum tersedia karena blog masih
        dalam proses pengembangan.
    </p>

    <footer>
        © 2026 newsbackmedia. All Rights Reserved.
    </footer>

</div>

</body>
</html>
